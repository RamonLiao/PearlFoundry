<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Nacre Ledger">
  <defs>
    <linearGradient id="nacre" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#d8f0e6"/>
      <stop offset="0.4" stop-color="#ded6f2"/>
      <stop offset="0.7" stop-color="#f7e2d2"/>
      <stop offset="1" stop-color="#d2eeea"/>
    </linearGradient>
    <radialGradient id="pearl" cx="0.38" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#fff0c8"/>
      <stop offset="0.45" stop-color="#f5c869"/>
      <stop offset="1" stop-color="#d2902f"/>
    </radialGradient>
  </defs>

  <!-- scallop fan shell: bold, bright nacre, hinge at bottom -->
  <path d="M32 52
           L10 28
           Q 13 31 15.5 25.5 Q 18.5 31 21.5 24 Q 24.5 31 28 22.5
           Q 30.5 31 32 21 Q 33.5 31 36 22.5 Q 39.5 31 42.5 24
           Q 45.5 31 48.5 25.5 Q 51 31 54 28
           Z"
        fill="url(#nacre)" stroke="#0b0d12" stroke-opacity="0.25" stroke-width="1"/>
  <!-- ribs radiating from hinge -->
  <g stroke="#9a7bb0" stroke-opacity="0.45" stroke-width="0.8" fill="none" stroke-linecap="round">
    <path d="M32 50 L17 27"/><path d="M32 50 L24.5 25"/><path d="M32 50 L32 24"/>
    <path d="M32 50 L39.5 25"/><path d="M32 50 L47 27"/>
  </g>
  <!-- hinge -->
  <circle cx="32" cy="51" r="2" fill="#c9c1e8"/>

  <!-- pearl nested at the hinge -->
  <circle cx="32" cy="43.5" r="7.5" fill="url(#pearl)" stroke="#fff" stroke-opacity="0.3" stroke-width="0.6"/>
  <circle cx="29.5" cy="41" r="2" fill="#fff" opacity="0.75"/>

  <!-- sparkle accent -->
  <path d="M50 14 l1 3.2 3.2 1 -3.2 1 -1 3.2 -1 -3.2 -3.2 -1 3.2 -1 z" fill="#f5d98a" opacity="0.9"/>
</svg>
