[package]
name = "structured_note_factory"
edition = "2024"
description = "DeepBook Predict structured-note factory (range accrual / capped upside / principal protected)"

[dependencies]
# Sui framework is an implicit system dependency on sui 1.73+ (no git rev needed).
#
# Predict has no public git source. We link against the live on-chain package via a
# local interface-stub whose Move.toml sets published-at to the deployed address.
# Stub modules mirror the verified ABI (predict, predict_manager, oracle, market_key,
# range_key); bodies are `abort 0` and are never deployed.
Predict = { local = "predict_interface" }

[addresses]
structured_note_factory = "0x0"

# Predict (testnet, verified 2026-06-16) — referenced by published-at via interface stub:
